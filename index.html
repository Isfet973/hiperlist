<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>HiperList</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <div class="title-block">
        <h1>HiperList</h1>
        <p>Catálogo em markdown com navegação por abas e carregamento de posters sob demanda. Os posters usam TMDB para filmes/séries e Jikan como fallback para anime.</p>
      </div>
      <div class="toolbar">
        <a class="profile-btn" href="./profile.html">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="8" cy="5" r="3"/>
            <path d="M2 14c0-3 2.7-5 6-5s6 2 6 5" stroke-linecap="round"/>
          </svg>
          Meu Perfil
        </a>
        <button class="primary" id="configureToken" type="button">Configurar TMDB</button>
        <button id="clearPosterCache" type="button">Limpar cache</button>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <nav class="tabs" id="tabs" aria-label="Abas do catálogo"></nav>
    <section id="content" aria-live="polite"></section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
